<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IngenioAlimentario - Campus Profesional Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Configuración de Firebase (Se llena automáticamente en el entorno de ejecución)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ingenio-alimentario-v1';

        // ESTADO GLOBAL
        window.appState = {
            view: 'login',
            user: null,
            activeCourse: null,
            activeModuleIndex: 0,
            isLoading: false
        };

        const catalogoCursos = [
            { 
                id: 'BPM-01', 
                titulo: 'Manipulación Higiénica de Alimentos', 
                horas: 10,
                precio: 35000,
                modulos: [
                    { 
                        nombre: 'Limpieza vs Desinfección', 
                        contenido: 'La limpieza elimina suciedad visible. La desinfección elimina microorganismos invisibles mediante químicos.',
                        preguntas: [{ q: "¿La limpieza elimina bacterias?", a: ["No, solo suciedad", "Sí, totalmente", "Depende del jabón"], correct: 0 }]
                    },
                    { 
                        nombre: 'Temperaturas Críticas', 
                        contenido: 'La zona de peligro está entre 5°C y 60°C. Mantener fuera de este rango.',
                        preguntas: [{ q: "¿Cuál es la zona de peligro?", a: ["0-10°C", "5-60°C", "80-100°C"], correct: 1 }]
                    }
                ]
            }
        ];

        // FUNCIONES DE PERSISTENCIA REAL
        async function saveUserProgress(progressData) {
            if (!auth.currentUser) return;
            const userRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'progress', 'current');
            await setDoc(userRef, progressData, { merge: true });
        }

        async function loadUserProgress() {
            if (!auth.currentUser) return null;
            const userRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'progress', 'current');
            const snap = await getDoc(userRef);
            return snap.exists() ? snap.data() : null;
        }

        // MANEJO DE VISTAS
        window.render = async () => {
            const root = document.getElementById('app-root');
            if (appState.isLoading) {
                root.innerHTML = `<div class="h-screen flex items-center justify-center font-bold text-teal-600 animate-pulse text-xl">Procesando...</div>`;
                return;
            }

            if (!auth.currentUser && appState.view !== 'signup') {
                root.innerHTML = renderLogin();
            } else if (appState.view === 'signup') {
                root.innerHTML = renderSignup();
            } else {
                root.innerHTML = `
                    <div class="flex h-screen overflow-hidden">
                        ${renderSidebar()}
                        <div class="flex-1 flex flex-col overflow-hidden">
                            ${renderNavbar()}
                            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                                ${renderViewContent()}
                            </main>
                        </div>
                    </div>
                `;
            }
        };

        // ACCIONES REALES
        window.handleAuth = async (e, type) => {
            e.preventDefault();
            appState.isLoading = true; render();
            const email = document.getElementById('email')?.value || document.getElementById('newEmail')?.value;
            const pass = document.getElementById('pass')?.value || document.getElementById('newPass')?.value;
            const name = document.getElementById('newName')?.value;

            try {
                if (type === 'signup') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'artifacts', appId, 'users', res.user.uid, 'profile', 'data'), {
                        name: name,
                        email: email,
                        doc: document.getElementById('newDoc').value,
                        createdAt: new Date()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                appState.view = 'campus';
            } catch (err) {
                alert("Error: " + err.message);
            }
            appState.isLoading = false; render();
        };

        window.processPaymentReal = async () => {
            appState.isLoading = true; render();
            // Simulación de respuesta de pasarela de pago real
            setTimeout(async () => {
                await saveUserProgress({ paid: true });
                appState.view = 'descarga';
                appState.isLoading = false;
                render();
            }, 2000);
        };

        // ESCUCHA DE ESTADO DE AUTH
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const profile = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                appState.user = profile.data();
                const prog = await loadUserProgress();
                if (prog) appState.activeModuleIndex = prog.moduleIndex || 0;
            } else {
                appState.user = null;
                appState.view = 'login';
            }
            render();
        });

        // FUNCIONES DE UI (Adaptadas de tu versión anterior)
        function renderLogin() {
            return `<div class="min-h-screen flex items-center justify-center brand-gradient p-6">
                <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md">
                    <h1 class="text-3xl font-black text-center mb-8">Ingenio<span class="text-teal-600">A.</span></h1>
                    <form onsubmit="handleAuth(event, 'login')" class="space-y-4">
                        <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border focus:border-teal-500">
                        <input type="password" id="pass" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border focus:border-teal-500">
                        <button class="w-full py-4 bg-teal-600 text-white rounded-2xl font-bold">Ingresar</button>
                    </form>
                    <button onclick="appState.view='signup';render();" class="w-full mt-4 text-sm text-gray-500 font-bold">Crear cuenta nueva</button>
                </div>
            </div>`;
        }

        function renderSignup() {
            return `<div class="min-h-screen flex items-center justify-center brand-gradient p-6">
                <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-lg">
                    <h1 class="text-3xl font-black text-center mb-8">Registro <span class="text-teal-600">Real</span></h1>
                    <form onsubmit="handleAuth(event, 'signup')" class="space-y-4">
                        <input type="text" id="newName" placeholder="Nombre completo" class="w-full p-4 bg-gray-50 rounded-2xl border" required>
                        <input type="text" id="newDoc" placeholder="Documento Identidad" class="w-full p-4 bg-gray-50 rounded-2xl border" required>
                        <input type="email" id="newEmail" placeholder="Correo electrónico" class="w-full p-4 bg-gray-50 rounded-2xl border" required>
                        <input type="password" id="newPass" placeholder="Contraseña segura" class="w-full p-4 bg-gray-50 rounded-2xl border" required>
                        <button class="w-full py-4 bg-teal-600 text-white rounded-2xl font-bold">Registrarse y Comenzar</button>
                    </form>
                    <button onclick="appState.view='login';render();" class="w-full mt-4 text-sm text-gray-400">Ya tengo cuenta</button>
                </div>
            </div>`;
        }

        function renderSidebar() {
            return `<aside class="w-64 bg-white border-r p-8 flex flex-col">
                <h1 class="text-xl font-black mb-10">IA Campus</h1>
                <nav class="space-y-4 flex-1">
                    <button onclick="appState.view='campus';render()" class="w-full text-left font-bold text-gray-600 hover:text-teal-600"><i class="fas fa-home mr-2"></i> Inicio</button>
                </nav>
                <button onclick="signOut(auth)" class="text-red-400 font-bold text-sm">Cerrar Sesión</button>
            </aside>`;
        }

        function renderNavbar() {
            return `<nav class="h-16 bg-white border-b px-8 flex items-center justify-between">
                <span class="text-xs font-black uppercase tracking-widest text-teal-600">Sistema Certificado v1.0</span>
                <span class="font-bold text-gray-800">${appState.user?.name || ''}</span>
            </nav>`;
        }

        function renderViewContent() {
            if (appState.view === 'campus') {
                return `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${catalogoCursos.map(c => `
                        <div class="bg-white p-8 rounded-[2rem] border shadow-sm">
                            <h3 class="text-xl font-black mb-4">${c.titulo}</h3>
                            <button onclick="startCourse('${c.id}')" class="w-full py-3 bg-gray-900 text-white rounded-xl font-bold">Empezar ahora</button>
                        </div>
                    `).join('')}
                </div>`;
            }

            if (appState.view === 'leccion') {
                const mod = appState.activeCourse.modulos[appState.activeModuleIndex];
                return `<div class="max-w-3xl mx-auto bg-white p-10 rounded-[2.5rem] border">
                    <h2 class="text-2xl font-black mb-6">${mod.nombre}</h2>
                    <p class="text-gray-600 mb-10 leading-relaxed text-lg">${mod.contenido}</p>
                    <button onclick="appState.view='examen';render()" class="w-full py-4 brand-gradient text-white rounded-2xl font-bold">Ir a la Evaluación</button>
                </div>`;
            }

            if (appState.view === 'examen') {
                const mod = appState.activeCourse.modulos[appState.activeModuleIndex];
                return `<div class="max-w-2xl mx-auto bg-white p-10 rounded-[2.5rem] border">
                    <h2 class="text-xl font-black mb-8">Evaluación del Módulo</h2>
                    <p class="font-bold mb-6">${mod.preguntas[0].q}</p>
                    <div class="space-y-3">
                        ${mod.preguntas[0].a.map((ans, i) => `
                            <button onclick="checkAnswer(${i})" class="w-full p-4 border-2 rounded-2xl text-left hover:border-teal-500 font-bold transition">${ans}</button>
                        `).join('')}
                    </div>
                </div>`;
            }

            if (appState.view === 'pago') {
                return `<div class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] border text-center">
                    <i class="fas fa-check-circle text-5xl text-green-500 mb-6"></i>
                    <h2 class="text-2xl font-black mb-4">¡Curso aprobado!</h2>
                    <p class="text-gray-500 mb-8">Para obtener tu certificado legal descargable, realiza el pago de $35.000 COP.</p>
                    <button onclick="processPaymentReal()" class="w-full py-4 bg-teal-600 text-white rounded-2xl font-bold mb-4">Pagar con PSE / Nequi / Tarjeta</button>
                    <p class="text-[10px] text-gray-400 uppercase">Conexión cifrada de extremo a extremo</p>
                </div>`;
            }

            if (appState.view === 'descarga') {
                return `<div class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] border text-center">
                    <i class="fas fa-award text-6xl text-yellow-500 mb-6"></i>
                    <h2 class="text-2xl font-black mb-4">Certificado Listo</h2>
                    <button onclick="downloadPDFReal()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold">Descargar PDF Oficial</button>
                </div>`;
            }
        }

        window.startCourse = (id) => {
            appState.activeCourse = catalogoCursos.find(c => c.id === id);
            appState.view = 'leccion';
            render();
        };

        window.checkAnswer = async (i) => {
            const mod = appState.activeCourse.modulos[appState.activeModuleIndex];
            if (i === mod.preguntas[0].correct) {
                if (appState.activeModuleIndex < appState.activeCourse.modulos.length - 1) {
                    appState.activeModuleIndex++;
                    await saveUserProgress({ moduleIndex: appState.activeModuleIndex });
                    appState.view = 'leccion';
                } else {
                    appState.view = 'pago';
                }
            } else {
                alert("Incorrecto. Repasa el contenido.");
                appState.view = 'leccion';
            }
            render();
        };

        window.downloadPDFReal = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            doc.setDrawColor(13, 148, 136); doc.setLineWidth(4); doc.rect(5, 5, 287, 200);
            doc.setFontSize(35); doc.text("CERTIFICADO PROFESIONAL", 148, 50, { align: 'center' });
            doc.setFontSize(30); doc.text(appState.user.name.toUpperCase(), 148, 100, { align: 'center' });
            doc.setFontSize(14); doc.text(`DOCUMENTO: ${appState.user.doc}`, 148, 115, { align: 'center' });
            doc.text("MANIPULACIÓN HIGIÉNICA DE ALIMENTOS - RES. 2674/2013", 148, 150, { align: 'center' });
            doc.save(`Certificado_${appState.user.name}.pdf`);
        };

    </script>

    <div id="app-root"></div>
</body>
</html>
